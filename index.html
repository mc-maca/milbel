<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>milbel</title>
  <style>
    :root {
      --text: #111;
      --muted: #666;
      --link: #b00000;
      --bg: #fff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      text-align: left;
    }

    .container {
      width: min(720px, calc(100vw - 48px));
      margin: 64px auto 40px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2.25rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1;
      text-align: right;
    }

    .intro {
      max-width: 520px;
      margin: 0 0 28px;
      font-size: 1rem;
      line-height: 1.55;
      color: var(--text);
    }

    .links {
      margin: 0 0 36px;
    }

    .links a {
      display: block;
      margin: 8px 0;
      text-decoration: none;
      color: var(--link);
      font-size: 1rem;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .image-container {
      margin-top: 0;
    }

    .image-container img {
      width: 100%;
      display: block;
      margin: 0;
      border-radius: 10px;
    }

    footer {
      margin: 56px 0 20px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 640px) {
      .container {
        width: min(100vw - 32px, 720px);
        margin-top: 40px;
      }

      h1 {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>milbel</h1>

    <p class="intro">
      exploring the origins of religious thought through prehistoric ritualism, mythology, and psychology.
    </p>

    <div class="links">
      <a href="https://milbel.com" target="_blank" rel="noopener noreferrer">neanderthal paganism</a>
      <a href="https://x.com/milbel_" target="_blank" rel="noopener noreferrer">x</a>
    </div>

    <div class="image-container">
      <img src="girl-on-bear.png" alt="Girl on bear">
    </div>

    <footer>© 2026 milbel</footer>
  </div>
</body>
</html>
