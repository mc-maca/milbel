<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>milbel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: white;
            text-align: center;
        }

        .container {
            max-width: 520px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            font-size: 2em;
            font-weight: 500;
            margin: 0 0 24px 0;
        }

        .hero-image {
            margin: 40px 0 32px;
            display: flex;
            justify-content: center;
        }

        .hero-image img {
            width: 100%;
            max-width: 420px;
            height: auto;
        }

        .links {
            margin-top: 10px;
        }

        .links a {
            color: #000;
            text-decoration: none;
            font-size: 1em;
        }

        .links a:hover {
            opacity: 0.6;
        }

        .separator {
            color: #ccc;
            margin: 0 8px;
        }

        footer {
            margin: clamp(40px, 8vh, 80px) 0 20px;
            color: #666;
            font-size: 12px;
        }

        @media (max-width: 600px) {
            .container {
                margin: 24px auto;
                padding: 16px;
            }

            .hero-image img {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>milbel</h1>

        <div class="hero-image">
            <img src="transparent-logo-white.png" alt="milbel symbol">
        </div>

        <div class="links">
            <a href="https://milbel.com" target="_blank" rel="noopener noreferrer">neanderthal paganism</a>
            <span class="separator">|</span>
            <a href="https://x.com/milbel_" target="_blank" rel="noopener noreferrer">x</a>
        </div>

        <footer>© 2026 milbel</footer>
    </div>
</body>
</html>
